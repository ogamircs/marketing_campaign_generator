name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - "huggingface/**"
      - ".github/workflows/deploy-huggingface-space.yml"
  workflow_dispatch:

concurrency:
  group: deploy-huggingface-space
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deploy dependency
        run: python -m pip install --upgrade pip huggingface_hub

      - name: Upload huggingface folder to Space
        env:
          HUGGING_FACE_API_TOKEN: ${{ secrets.HUGGING_FACE_API_TOKEN }}
          HUGGING_FACE_SPACE_REPO_ID: ${{ secrets.HUGGING_FACE_SPACE_REPO_ID }}
          HUGGING_FACE_SPACE_URL: ${{ secrets.HUGGING_FACE_SPACE_URL }}
        run: python huggingface/deploy_space.py
